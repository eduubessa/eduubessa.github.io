        function getLocalDateKey() {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function vaultHashFallbackBytes(str, len) {
            const out = new Uint8Array(len);
            let seed = 2166136261;
            for (let i = 0; i < str.length; i++) {
                seed ^= str.charCodeAt(i);
                seed = Math.imul(seed, 16777619) >>> 0;
            }
            for (let i = 0; i < len; i++) {
                seed = (Math.imul(seed, 1103515245) + 12345) >>> 0;
                out[i] = seed & 255;
            }
            return out;
        }

        async function getDailyVaultCode() {
            const dateKey = getLocalDateKey();
            const payload = 'EdOS-vault|' + dateKey + '|' + VAULT_SECRET;
            let bytes;
            if (window.crypto?.subtle) {
                const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(payload));
                bytes = new Uint8Array(buf);
            } else {
                bytes = vaultHashFallbackBytes(payload, 32);
            }
            const alphabet = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 8; i++) code += alphabet[bytes[i] % alphabet.length];
            return code;
        }

            applyTheme() {
                const dark = this.theme === 'dark';
                document.body.classList.toggle('dark-mode', dark);
                document.body.classList.toggle('light-mode', !dark);
                document.body.dataset.theme = dark ? 'dark' : 'light';
                document.querySelector('meta[name="theme-color"]')?.setAttribute('content', dark ? '#0d1117' : '#f0f4fa');
                const btn = document.getElementById('theme-toggle');
                if (btn) {
                    btn.setAttribute('aria-pressed', dark ? 'true' : 'false');
                    btn.setAttribute('aria-label', dark ? this.t('theme.useLight') : this.t('theme.useDark'));
                }
                document.querySelector('.theme-icon-moon')?.classList.toggle('hidden', dark);
                document.querySelector('.theme-icon-sun')?.classList.toggle('hidden', !dark);
                lucide.createIcons();
            }

            setupLoader() {
                setTimeout(() => {
                    const loader = document.getElementById('loader');
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                        this.checkGate();
                    }, 600);
                }, 1500);
            }

                if (localStorage.getItem('gate_passed')) this.unlockSite();
                else document.getElementById('age-gate').classList.remove('hidden');
            }

                document.getElementById('age-gate').style.display = 'none';
                document.getElementById('main-content').classList.remove('invisible');
                document.body.style.overflowY = 'auto';
                this.initReveal();
                this.printTerminal(DATA.translations[this.lang].terminal.welcome, 'text-green-500');
                const fab = document.getElementById('chat-fab');
                if (fab) fab.classList.remove('hidden');
                lucide.createIcons();
                const ti = document.getElementById('term-input');
                if (ti) ti.focus();
                this.refreshVaultUi();
            }

            refreshVaultUi() {
                const dateKey = getLocalDateKey();
                const locked = document.getElementById('vault-locked');
                const unlocked = document.getElementById('vault-unlocked');
                const err = document.getElementById('vault-error');
                const dateEl = document.getElementById('vault-date');
                if (dateEl) {
                    const d = new Date();
                    const loc = this.lang === 'pt' ? 'pt-PT' : 'en-GB';
                    dateEl.textContent = d.toLocaleDateString(loc, { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                }
                const sessKey = 'vault_ok_' + dateKey;
                if (localStorage.getItem(sessKey) === '1') {
                    locked?.classList.add('hidden');
                    unlocked?.classList.remove('hidden');
                    err?.classList.add('hidden');
                } else {
                    locked?.classList.remove('hidden');
                    unlocked?.classList.add('hidden');
                }
                lucide.createIcons();
            }

            async tryUnlockVault() {
                const input = document.getElementById('input-pass');
                const err = document.getElementById('vault-error');
                const val = (input?.value || '').trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
                const code = await getDailyVaultCode();
                if (val === code) {
                    localStorage.setItem('vault_ok_' + getLocalDateKey(), '1');
                    document.getElementById('vault-locked').classList.add('hidden');
                    document.getElementById('vault-unlocked').classList.remove('hidden');
                    err?.classList.add('hidden');
                    if (input) input.value = '';
                    lucide.createIcons();
                } else {
                    if (err) {
                        err.textContent = this.t('vault.wrong');
                        err.classList.remove('hidden');
                    }
                    input?.classList.add('border-red-500');
                    setTimeout(() => input?.classList.remove('border-red-500'), 800);
                }
            }

                const t = DATA.translations[this.lang];

                    const key = el.getAttribute('data-i18n');
                    const val = key.split('.').reduce((o, i) => o?.[i], t);
                    if (val !== undefined && val !== '') el.innerText = val;
                });
                document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                    const key = el.getAttribute('data-i18n-placeholder');
                    const val = key.split('.').reduce((o, i) => o?.[i], t);
                    if (val) el.setAttribute('placeholder', val);
                });
                document.querySelectorAll('[data-i18n-aria]').forEach(el => {
                    const key = el.getAttribute('data-i18n-aria');
                    const val = key.split('.').reduce((o, i) => o?.[i], t);
                    if (val) el.setAttribute('aria-label', val);
                });
                const promptEl = document.getElementById('term-prompt-label');
                if (promptEl && t.terminal?.prompt) promptEl.textContent = t.terminal.prompt;
                this.renderTimeline();

                const tb = document.getElementById('theme-toggle');
                if (tb) tb.setAttribute('aria-label', this.theme === 'dark' ? this.t('theme.useLight') : this.t('theme.useDark'));
                lucide.createIcons();
            }

            renderTimeline() {
                const cont = document.getElementById('timeline-content');
                const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
                cont.innerHTML = DATA.experiences.map((ex, i) => {
                    const desc = esc(ex[this.lang]);
                    const company = esc(ex.company);
                    const role = esc(ex.role);
                    const loc = esc(ex.loc);
                    const year = esc(ex.year);
                    const left = i % 2 === 0;
                    const cardHtml = `
                        <article class="timeline-card glass rounded-2xl border border-white/10 overflow-hidden w-full max-w-md text-left">
                            <div class="h-40 sm:h-44 overflow-hidden bg-black/40">
                                <img src="${ex.img}" alt="${company}" class="timeline-img w-full h-full object-cover grayscale" loading="lazy" width="512" height="220">
                            </div>
                            <div class="p-5">
                                <p class="text-[10px] font-mono text-blue-500 uppercase tracking-wider mb-1">${role}</p>
                                <h3 class="text-white font-bold text-lg md:text-xl mb-1">${company}</h3>
                                <p class="text-gray-500 text-xs font-mono mb-3">${loc}</p>
                                <p class="text-gray-400 text-sm leading-relaxed">${desc}</p>
                            </div>
                        </article>`;
                    const yearGhost = `<span class="text-5xl sm:text-6xl md:text-7xl font-bold text-blue-500/10 font-mono select-none pointer-events-none leading-none">${year}</span>`;
                    return `
                    <div class="timeline-item relative mb-16 md:mb-24 last:mb-8 reveal group">
                        <div class="md:hidden relative pl-8 ml-1 border-l border-blue-500/35 pb-2">
                            <div class="absolute -left-[5px] top-1 w-2.5 h-2.5 rounded-full bg-blue-500 ring-4 ring-[#0a0d12] timeline-node"></div>
                            <span class="inline-block text-blue-400 font-mono text-xs mb-4">${year}</span>
                            ${cardHtml}
                        </div>
                        <div class="hidden md:block relative">
                            <div class="grid grid-cols-2 gap-4 lg:gap-8 items-center min-h-[240px]">
                                <div class="flex justify-end pr-4 lg:pr-12 items-center min-h-[200px]">
                                    ${left ? cardHtml : `<div class="w-full flex justify-end">${yearGhost}</div>`}
                                </div>
                                <div class="flex justify-start pl-4 lg:pl-12 items-center min-h-[200px]">
                                    ${left ? `<div class="w-full flex justify-start">${yearGhost}</div>` : cardHtml}
                                </div>
                            </div>
                            <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-10 timeline-node w-11 h-11 rounded-full bg-[#0a0d12] border-2 border-blue-500 flex items-center justify-center font-mono text-[11px] text-blue-400 shadow-[0_0_24px_rgba(88,166,255,0.25)] group-hover:scale-110 transition-transform duration-300 pointer-events-none">${year}</div>
                        </div>
                    </div>`;
                }).join('');
                this.initRevealForTimeline();
            }

            initRevealForTimeline() {
                const obs = new IntersectionObserver((ents) => ents.forEach((e) => {
                    if (e.isIntersecting) e.target.classList.add('active');
                }), { threshold: 0.12 });
                document.querySelectorAll('#timeline-content .reveal').forEach((el) => obs.observe(el));
            }

            setProjectsLoading(active) {
                const el = document.getElementById('projects-loading');
                const bar = document.getElementById('projects-loading-bar');
                if (!el || !bar) return;
                if (active) {
                    el.setAttribute('aria-busy', 'true');
                    el.setAttribute('aria-hidden', 'false');
                    el.classList.add('is-active');
                    bar.style.width = '0%';
                    bar.style.transition = 'width 0.35s ease-out';
                    requestAnimationFrame(() => { requestAnimationFrame(() => { bar.style.width = '92%'; }); });
                } else {
                    bar.style.width = '100%';
                    setTimeout(() => {
                        el.classList.remove('is-active');
                        el.setAttribute('aria-busy', 'false');
                        el.setAttribute('aria-hidden', 'true');
                        bar.style.width = '0%';
                    }, 200);
                }
            }

            async renderProjects(opts = {}) {
                const useLoading = opts.useLoading === true;
                if (useLoading) {
                    this.setProjectsLoading(true);
                    await new Promise(r => setTimeout(r, 420));
                }
                try {
                    const grid = document.getElementById('projects-grid');
                    const filtered = DATA.projects.filter(p => this.currentFilter === 'all' || p.cat === this.currentFilter);
                    const start = (this.currentPage - 1) * this.projectsPerPage;
                    const paginated = filtered.slice(start, start + this.projectsPerPage);

                    grid.innerHTML = paginated.map(p => `
                    <article class="project-item glass rounded-2xl overflow-hidden border border-white/5 group">
                        <div class="h-48 overflow-hidden">
                            <img src="${p.img}" alt="${p.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy" width="400" height="192">
                        </div>
                        <div class="p-6">
                            <span class="text-[10px] font-mono text-blue-500 uppercase">${p.cat}</span>
                            <h3 class="text-white font-bold mt-1">${p.title}</h3>
                        </div>
                    </article>
                `).join('');

                    this.renderPagination(filtered.length);
                } finally {
                    if (useLoading) this.setProjectsLoading(false);
                }
            }

            renderPagination(total) {
                const pages = Math.ceil(total / this.projectsPerPage);
                const container = document.getElementById('pagination');
                if (pages <= 1) { container.innerHTML = ''; return; }

                let btns = '';
                for (let i = 1; i <= pages; i++) {
                    btns += `<button type="button" class="page-btn w-8 h-8 rounded border ${this.currentPage === i ? 'bg-blue-600 border-blue-600 text-white' : 'border-white/10 text-gray-500'}" data-page="${i}">${i}</button>`;
                }
                container.innerHTML = btns;

                document.querySelectorAll('.page-btn').forEach(b => {
                    b.onclick = async () => {
                        this.currentPage = parseInt(b.dataset.page, 10);
                        await this.renderProjects({ useLoading: true });
                    };
                });
            }

            termAppendLine(html, className = 'text-gray-400') {
                const out = document.getElementById('term-output');
                const line = document.createElement('div');
                line.className = `mb-2 ${className}`;
                line.innerHTML = html;
                out.appendChild(line);
                out.scrollTop = out.scrollHeight;
            }

            async printTerminal(text, color = 'text-gray-400') {
                const out = document.getElementById('term-output');
                const line = document.createElement('div');
                line.className = `mb-2 whitespace-pre-wrap ${color}`;
                out.appendChild(line);
                const safe = text.split('');
                for (const c of safe) {
                    const span = document.createElement('span');
                    span.textContent = c === '\n' ? '\n' : c;
                    if (c === '\n') line.appendChild(document.createElement('br'));
                    else line.appendChild(span);
                    out.scrollTop = out.scrollHeight;
                    await new Promise(r => setTimeout(r, 4));
                }
            }

            echoPrompt(cmd) {
                const esc = cmd.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                this.termAppendLine(`<span class="text-green-500">${this.t('terminal.prompt')}</span> <span class="text-white">${esc}</span>`, 'text-gray-300');
            }

            clearTerminal() {
                document.getElementById('term-output').innerHTML = '';
            }

            showTermSuggest(val) {
                const box = document.getElementById('term-suggest');
                if (!val.startsWith('/')) {
                    box.classList.add('hidden');
                    box.innerHTML = '';
                    return;
                }
                const q = val.toLowerCase();
                const list = SLASH_COMMANDS.filter(s => s.cmd.toLowerCase().startsWith(q));
                if (!list.length) {
                    box.classList.add('hidden');
                    return;
                }
                this.suggestIndex = 0;
                box.innerHTML = list.map((s, i) => {
                    const d = this.lang === 'pt' ? s.descPt : s.descEn;
                    return `<button type="button" class="suggest-item w-full text-left px-3 py-2 text-[11px] text-gray-300 hover:bg-white/5 border-b border-white/5 last:border-0 ${i === 0 ? 'active' : ''}" data-cmd="${s.cmd}"><span class="text-blue-400">${s.cmd}</span> <span class="text-gray-500">${d}</span></button>`;
                }).join('');
                box.classList.remove('hidden');
                box.querySelectorAll('.suggest-item').forEach(btn => {
                    btn.onclick = () => {
                        document.getElementById('term-input').value = btn.dataset.cmd + ' ';
                        box.classList.add('hidden');
                        document.getElementById('term-input').focus();
                    };
                });
            }

            highlightSuggest(dir) {
                const items = document.querySelectorAll('#term-suggest .suggest-item');
                if (!items.length) return;
                items[this.suggestIndex]?.classList.remove('active');
                this.suggestIndex = (this.suggestIndex + dir + items.length) % items.length;
                items[this.suggestIndex]?.classList.add('active');
                items[this.suggestIndex]?.scrollIntoView({ block: 'nearest' });
            }

            applyActiveSuggest() {
                let active = document.querySelector('#term-suggest .suggest-item.active');
                if (!active) active = document.querySelector('#term-suggest .suggest-item');
                if (active) {
                    document.getElementById('term-input').value = active.dataset.cmd + ' ';
                    document.getElementById('term-suggest').classList.add('hidden');
                }
            }

            async fetchPublicIp() {
                try {
                    const r = await fetch('https://api.ipify.org?format=json', { cache: 'no-store' });
                    const j = await r.json();
                    return j.ip || '—';
                } catch {
                    return '—';
                }
            }

            async getLocalIpCandidates() {
                return new Promise((resolve) => {
                    const found = new Set();
                    const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
                    pc.createDataChannel('');
                    pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => resolve([]));
                    const t = setTimeout(() => { pc.close(); resolve([...found]); }, 2500);
                    pc.onicecandidate = (e) => {
                        if (!e.candidate) return;
                        const m = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
                        if (m && !m[1].startsWith('0.') && m[1] !== '0.0.0.0') found.add(m[1]);
                    };
                    pc.onicegatheringstatechange = () => {
                        if (pc.iceGatheringState === 'complete') {
                            clearTimeout(t);
                            pc.close();
                            resolve([...found]);
                        }
                    };
                });
            }

            async cmdIpconfig() {
                const hdr = this.t('terminal.ipconfigHdr');
                const pub = await this.fetchPublicIp();
                const locals = await this.getLocalIpCandidates();
                const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                const lines = [
                    hdr,
                    '',
                    '  Host name (browser) .......: ' + (typeof location !== 'undefined' ? location.hostname : '—'),
                    '  Public IPv4 ...............: ' + pub,
                    '  Local ICE candidates .....: ' + (locals.length ? locals.join(', ') : '— (WebRTC não expôs IP local)'),
                    '  User agent ................: ' + (navigator.userAgent || '—').slice(0, 120) + (navigator.userAgent?.length > 120 ? '…' : ''),
                ];
                if (conn) {
                    lines.push('  Effective connection ......: ' + (conn.effectiveType || '—'));
                    lines.push('  Downlink estimate .........: ' + (conn.downlink != null ? conn.downlink + ' Mbps' : '—'));
                    lines.push('  RTT .......................: ' + (conn.rtt != null ? conn.rtt + ' ms' : '—'));
                }
                lines.push('', '  Nota: ipconfig real do SO não está disponível no browser; acima: dados da rede/WebRTC.');
                await this.printTerminal(lines.join('\n'), 'text-gray-300');
            }

            helpText() {
                const base = [
                    'help, ?, ls — esta lista',
                    'clear, cls — limpar ecrã',
                    'about — perfil',
                    'skills — competências',
                    'exp — timeline',
                    'ipconfig — rede (browser + IP público)',
                    'whoami, version — info',
                    'chat | talk — abrir chat (ou /chat, /talk)',
                    '/ — lista filtrada ao escrever após /'
                ];
                return this.t('terminal.helpHeader') + '\n\n  ' + base.join('\n  ');
            }

            async processCommand(raw) {
                const line = raw.trim();
                if (!line) return;
                this.termHistory.push(line);
                this.historyIndex = this.termHistory.length;
                this.echoPrompt(line);

                const norm = line.toLowerCase();
                const first = norm.split(/\s+/)[0];

                if (first === '/chat' || first === '/talk' || norm === 'chat' || norm === 'talk') {
                    await this.printTerminal(this.t('terminal.chatOpened'), 'text-blue-400');
                    this.openChat();
                    return;
                }
                if (first === '/clear' || first === 'clear' || first === 'cls') {
                    this.clearTerminal();
                    return;
                }
                if (first === '/ipconfig' || first === 'ipconfig') {
                    await this.cmdIpconfig();
                    return;
                }
                if (first === '/help' || first === 'help' || first === '?' || first === 'ls') {
                    await this.printTerminal(this.helpText(), 'text-gray-300');
                    return;
                }
                if (first === '/about' || first === 'about') {
                    await this.printTerminal(DATA.translations[this.lang].about.text1 + '\n\n' + DATA.translations[this.lang].about.text2, 'text-gray-300');
                    return;
                }
                if (first === '/skills' || first === 'skills') {
                    await this.printTerminal('Full-Stack · Laravel · Vue · Python · FFmpeg · APIs · Data automation', 'text-gray-300');
                    return;
                }
                if (first === '/exp' || first === 'exp') {
                    const ex = DATA.experiences.map(e => e.year + ' — ' + e.company + ' · ' + e.role + '\n   ' + e[this.lang]).join('\n\n');
                    await this.printTerminal(ex, 'text-gray-300');
                    return;
                }
                if (first === 'whoami') {
                    await this.printTerminal('guest (EdOS shell)', 'text-gray-300');
                    return;
                }
                if (first === 'version') {
                    await this.printTerminal('EdOS Kernel 6.2.0-v7+ (browser shell)', 'text-gray-300');
                    return;
                }
                if (first === 'exit') {
                    await this.printTerminal('exit: sessão web mantida. Fecha o separador para sair.', 'text-yellow-500');
                    return;
                }

                await this.printTerminal(this.t('terminal.unknown') + line, 'text-red-400');
            }

            async translateText(text, from, to) {
                if (!text || from === to) return text;
                try {
                    const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=' + encodeURIComponent(from + '|' + to);
                    const r = await fetch(url);
                    const j = await r.json();
                    if (j.responseStatus === 200 && j.responseData?.translatedText)
                        return j.responseData.translatedText;
                } catch (e) { /* fallback below */ }
                return text;
            }

            async syncChatToLang(targetLang) {
                if (!this.chatMessages.length) return;
                const codes = { pt: 'pt', en: 'en' };
                for (const msg of this.chatMessages) {
                    const cached = msg.displayCache[targetLang];
                    if (cached != null && String(cached).length > 0) continue;
                    if (msg.originalLang === targetLang) {
                        msg.displayCache[targetLang] = msg.originalText;
                    } else {
                        const from = codes[msg.originalLang];
                        const to = codes[targetLang];
                        msg.displayCache[targetLang] = await this.translateText(msg.originalText, from, to);
                        await new Promise(r => setTimeout(r, 150));
                    }
                }
                this.renderChatMessages(targetLang);
            }

            renderChatMessages(forLang) {
                const L = forLang ?? this.lang;
                const box = document.getElementById('chat-messages');
                if (!box) return;
                box.innerHTML = '';
                for (const msg of this.chatMessages) {
                    const text = (msg.displayCache[L] != null && msg.displayCache[L] !== '') ? msg.displayCache[L] : msg.originalText;
                    const div = document.createElement('div');
                    div.className = msg.role === 'user' ? 'chat-msg-user px-3 py-2 rounded-lg max-w-[90%]' : 'chat-msg-bot px-3 py-2 rounded-lg max-w-[90%]';
                    div.textContent = text;
                    box.appendChild(div);
                }
                box.scrollTop = box.scrollHeight;
            }

            addChatMessage(role, text) {
                const lang = this.lang;
                this.chatMessages.push({
                    role,
                    originalLang: lang,
                    originalText: text,
                    displayCache: { [lang]: text }
                });
                this.renderChatMessages();
            }

            setChatFabOpen(isOpen) {
                const fab = document.getElementById('chat-fab');
                if (!fab) return;
                fab.classList.toggle('hidden', isOpen);
                fab.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            }

            openChat() {
                const panel = document.getElementById('chat-panel');
                const back = document.getElementById('chat-backdrop');
                this.setChatFabOpen(true);
                back.classList.remove('hidden');
                requestAnimationFrame(() => {
                    back.classList.remove('opacity-0');
                    panel.classList.remove('hidden');
                    requestAnimationFrame(() => {
                        panel.classList.remove('scale-95', 'opacity-0');
                    });
                });
                back.setAttribute('aria-hidden', 'false');
                if (!this.chatMessages.length) {
                    this.addChatMessage('bot', this.t('chat.welcome'));
                } else {
                    this.renderChatMessages();
                }
                document.getElementById('chat-input').focus();
                lucide.createIcons();
            }

            closeChat() {
                const panel = document.getElementById('chat-panel');
                const back = document.getElementById('chat-backdrop');
                back.classList.add('opacity-0');
                panel.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    panel.classList.add('hidden');
                    back.classList.add('hidden');
                    back.setAttribute('aria-hidden', 'true');
                    this.setChatFabOpen(false);
                }, 300);
                document.getElementById('term-input')?.focus();
            }

            async respondChat(userText) {
                const typing = document.getElementById('chat-typing');
                typing.classList.remove('hidden');
                const lower = userText.toLowerCase();
                const faq = CHAT_FAQ.find(f => f.keys.some(k => lower.includes(k)));
                const replies = DATA.translations[this.lang].chat.replies;
                let reply;
                if (faq) {
                    reply = this.lang === 'pt' ? faq.replyPt : faq.replyEn;
                } else {
                    reply = replies[this.chatReplyIndex % replies.length];
                    this.chatReplyIndex++;
                }
                await new Promise(r => setTimeout(r, 500 + Math.random() * 700));
                typing.classList.add('hidden');
                this.addChatMessage('bot', reply);
            }

            installDevToolsGuards() {
                document.addEventListener('contextmenu', (e) => { e.preventDefault(); }, { passive: false });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'F12') { e.preventDefault(); return; }
                    if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C', 'K'].includes(e.key.toUpperCase())) { e.preventDefault(); return; }
                    if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) { e.preventDefault(); return; }
                    if (e.ctrlKey && (e.key === 's' || e.key === 'S')) { e.preventDefault(); return; }
                    if (e.metaKey && e.altKey && e.key.toLowerCase() === 'i') { e.preventDefault(); return; }
                }, true);
            }

            bindEvents() {
                document.getElementById('btn-confirm').onclick = () => {
                    localStorage.setItem('gate_passed', 'true');
                    this.unlockSite();
                };
                document.getElementById('theme-toggle').onclick = () => {
                    this.theme = this.theme === 'dark' ? 'light' : 'dark';
                    localStorage.setItem('edos_theme', this.theme);
                    this.applyTheme();
                };
                document.getElementById('btn-unlock').onclick = () => this.tryUnlockVault();
                const passInput = document.getElementById('input-pass');
                passInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        this.tryUnlockVault();
                    }
                });
                passInput.addEventListener('input', (e) => {
                    e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                });

                document.querySelectorAll('.lang-btn').forEach(b => {
                    b.onclick = async () => {
                        const next = b.dataset.lang;
                        if (next === this.lang) return;
                        await this.syncChatToLang(next);
                        this.lang = next;
                        document.querySelectorAll('.lang-btn').forEach(x => x.classList.remove('bg-blue-600', 'text-white'));
                        b.classList.add('bg-blue-600', 'text-white');
                        this.updateUI();
                        this.renderChatMessages();
                    };
                });
                document.querySelectorAll('.lang-btn').forEach(b => {
                    if (b.dataset.lang === this.lang) b.classList.add('bg-blue-600', 'text-white');
                });

                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.onclick = async () => {
                        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                        b.classList.add('active');
                        this.currentFilter = b.dataset.filter;
                        this.currentPage = 1;
                        await this.renderProjects({ useLoading: true });
                    };
                });

                document.getElementById('chat-fab').onclick = () => this.openChat();

                const termInput = document.getElementById('term-input');
                termInput.addEventListener('input', () => this.showTermSuggest(termInput.value));

                termInput.addEventListener('keydown', async (e) => {
                    const box = document.getElementById('term-suggest');
                    const open = !box.classList.contains('hidden') && box.querySelector('.suggest-item');

                    if (e.key === 'ArrowDown' && open) {
                        e.preventDefault();
                        this.highlightSuggest(1);
                        return;
                    }
                    if (e.key === 'ArrowUp' && open) {
                        e.preventDefault();
                        this.highlightSuggest(-1);
                        return;
                    }
                    if (e.key === 'Tab' && open) {
                        e.preventDefault();
                        this.applyActiveSuggest();
                        return;
                    }

                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (open) {
                            this.applyActiveSuggest();
                            const v = termInput.value.trim();
                            termInput.value = '';
                            document.getElementById('term-suggest').classList.add('hidden');
                            if (v) await this.processCommand(v);
                            return;
                        }
                        const v = termInput.value;
                        termInput.value = '';
                        document.getElementById('term-suggest').classList.add('hidden');
                        await this.processCommand(v);
                        return;
                    }

                    if (e.key === 'Escape') {
                        document.getElementById('term-suggest').classList.add('hidden');
                        return;
                    }

                    if (e.key === 'ArrowUp' && !open && document.activeElement === termInput) {
                        if (this.termHistory.length) {
                            e.preventDefault();
                            this.historyIndex = Math.max(0, this.historyIndex - 1);
                            termInput.value = this.termHistory[this.historyIndex] ?? '';
                        }
                    }
                    if (e.key === 'ArrowDown' && !open && document.activeElement === termInput) {
                        if (this.termHistory.length) {
                            e.preventDefault();
                            this.historyIndex = Math.min(this.termHistory.length, this.historyIndex + 1);
                            termInput.value = this.historyIndex >= this.termHistory.length ? '' : (this.termHistory[this.historyIndex] ?? '');
                        }
                    }
                });

                document.getElementById('chat-close').onclick = () => this.closeChat();
                document.getElementById('chat-backdrop').onclick = () => this.closeChat();

                const chatInput = document.getElementById('chat-input');
                chatInput.addEventListener('keydown', async (e) => {
                    if (e.key !== 'Enter') return;
                    e.preventDefault();
                    const t = chatInput.value.trim();
                    if (!t) return;
                    chatInput.value = '';
                    this.addChatMessage('user', t);
                    await this.respondChat(t);
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && !document.getElementById('chat-panel').classList.contains('hidden')) {
                        this.closeChat();
                    }
                });
            }

            initReveal() {
                const obs = new IntersectionObserver(ents => ents.forEach(e => { if (e.isIntersecting) e.target.classList.add('active'); }), { threshold: 0.1 });
                document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
            }
        }

        window.addEventListener('load', () => new EdOSEngine());
    </script>
</body>
